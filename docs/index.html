<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Stack 2025</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .card {
            background-color: #6a1b9a;
            color: white;
            border-radius: 8px;
            margin: 15px;
            padding: 20px;
            width: 250px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .search {
            margin: 20px;
        }
        .filter {
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Interactive AI Stack 2025</h1>
    <div class="search">
        <input type="text" placeholder="Search..." id="search" />
    </div>
    <div class="filter">
       <select id="filter">
           <option value="">Filter by layer</option>
           <option value="Cérebro">Cérebro</option>
           <option value="Agentes">Agentes</option>
           <option value="Automação">Automação</option>
           <option value="Criação">Criação</option>
           <option value="Produto">Produto</option>
           <option value="Plataformas">Plataformas</option>
       </select>
    </div>
    <div class="dashboard">
        <!-- Example Cards for AI Tools -->
        <div class="card">Tool 1</div>
        <div class="card">Tool 2</div>
        <div class="card">Tool 3</div>
        <div class="card">Tool 4</div>
        <div class="card">Tool 5</div>
        <div class="card">Tool 6</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Real-time search functionality
        const searchInput = document.getElementById('search');
        const cards = document.querySelectorAll('.card');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(query) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
